<html lang="en">
<head>

  <title>Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(135deg, #020617, #0f172a);
    }

    h1 {
      font-size: 64px;

    button {

      transition: 0.2s;
