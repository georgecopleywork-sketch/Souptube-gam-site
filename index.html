<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Souptube V3</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #0b0f2a, #02040f);
  overflow: hidden;
  color: white;
}

/* FAKE STAR BACKGROUND (CSS instead of canvas) */
.stars {
  position: fixed;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(2px 2px at 20% 30%, white, transparent),
    radial-gradient(2px 2px at 70% 60%, white, transparent),
    radial-gradient(1px 1px at 40% 80%, white, transparent),
    radial-gradient(2px 2px at 90% 20%, white, transparent);
  background-size: 200px 200px;
  animation: moveStars 60s linear infinite;
  opacity: 0.6;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}

/* CENTER UI */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* TITLE */
.title {
  font-size: 60px;
  text-shadow: 0 0 20px white;
}

/* BUTTONS */
button {
  margin: 10px;
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  backdrop-filter: blur(6px);
}

button:hover {
  background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="center">
  <div class="title">Souptube V3</div>

  <button onclick="go('https://sites.google.com/g.risd.org/tips-for-8thgrade-science-v3/youube')">
    YouTube URL Spitter
  </button>

  <button onclick="go('https://sites.google.com/g.risd.org/tips-for-8thgrade-science-v3/gogardian-boker')">
    GoGuardian Blocker
  </button>
</div>

<script>
function go(link) {
  window.top.location.href = link;
}
</script>

</body>
</html>
