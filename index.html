<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Souptube V3</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #02040f;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CENTER BOX */
.container {
  text-align: center;
}

/* TITLE */
.title {
  font-size: 60px;
  margin-bottom: 20px;
}

/* BUTTONS */
button {
  display: block;
  margin: 10px auto;
  padding: 12px 20px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #333;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Souptube V3</div>

  <button onclick="go('https://google.com')">
    Test Button
  </button>
</div>

<script>
function go(link) {
  window.location.href = link;
}
</script>

</body>
</html>
